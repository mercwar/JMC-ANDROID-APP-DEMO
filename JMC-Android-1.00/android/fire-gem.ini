[CORE]
; Fire-Gem Android root
fg_root=C:\Apache24\fire-gem-android

; Vtable file (ASM data file)
vtable=fire-vtbl.asm

; Directory containing user command INIs
ini_dir=C:\Apache24\fire-gem-android\ini

; JSON configuration anchors (never move)
json_core=C:\Apache24\fire-gem-android\json\fire-gem.json
json_android=C:\Apache24\fire-gem-android\json\fire-gem-android.json

; Behavior flags
auto_scan_ini=1
prompt_on_new_ini=1
show_menu_on_start=1
allow_user_input=1
print_events=1


[ANDROID]
; Android project root (your app)
project_root=C:\Apache24\htdocs\android

; Build script (your full native build pipeline)
build_script=C:\Apache24\htdocs\android\FFF_DARKCOMM2.sh

; Emulator launcher script
run_script=C:\Apache24\htdocs\android\run_android.sh

; Optional secondary script
darkcomm_script=C:\Apache24\htdocs\android\FFF_DARKCOMM2.sh

; Build output directory
build_dir=C:\Apache24\htdocs\android\build

; Native library output
lib_arm64=C:\Apache24\htdocs\android\build\lib\arm64-v8a
lib_x86_64=C:\Apache24\htdocs\android\build\lib\x86_64

; APK artifacts
apk_aligned=C:\Apache24\htdocs\android\build\aligned.apk
apk_app=C:\Apache24\htdocs\android\build\app.apk
apk_base=C:\Apache24\htdocs\android\build\base.apk

; Emulator binary + AVD name
emulator_bin=/c/Android/Sdk/emulator/emulator
emulator_avd=avis_emulator


[TOOLS]
; Required toolchain paths (Fire-Gem will check these)
java_home=C:\Program Files\Eclipse Adoptium\jdk-25.0.2.10-hotspot
ndk_root=C:\android-ndk-r27d
sdk_root=C:\Android\Sdk

aapt2=C:\Android\Sdk\build-tools\34.0.0\aapt2.exe
zipalign=C:\Android\Sdk\build-tools\34.0.0\zipalign.exe
apksigner=C:\Android\Sdk\build-tools\34.0.0\apksigner.bat
platform_jar=C:\Android\Sdk\platforms\android-34\android.jar
adb=C:\Android\Sdk\platform-tools\adb.exe


[UI]
title=FIRE-GEM ANDROID KERNEL
prompt=fg.android>

msg_ini_detected=INI files detected in fire-gem-android\\ini. Load now? (Y/N):
msg_loading_ini=Loading Fire-Gem command INIs...
msg_ready=Fire-Gem Android subsystem ready.
msg_missing_dep=Missing dependency detected. Please install it manually.
msg_android_ok=Android environment verified.
msg_android_fail=Android environment incomplete.


[DEPS]
; Fire-Gem will CHECK these and WARN the user if missing
require_java=1
require_ndk=1
require_sdk=1
require_build_tools=1
require_emulator=1
require_avd=1
require_project_tree=1
